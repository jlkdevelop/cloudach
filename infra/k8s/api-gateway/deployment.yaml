apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: cloudach
  labels:
    app: api-gateway
    component: gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: us-central1-docker.pkg.dev/PROJECT_ID/cloudach/api-gateway:latest
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: PORT
              value: "8080"
            - name: VLLM_BASE_URL
              value: "http://vllm-llama3-8b:8000"
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: cloudach-secrets
                  key: redis-url
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: cloudach-secrets
                  key: jwt-secret
            - name: DB_URL
              valueFrom:
                secretKeyRef:
                  name: cloudach-secrets
                  key: db-url
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values: [api-gateway]
                topologyKey: kubernetes.io/hostname
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: cloudach
spec:
  selector:
    app: api-gateway
  ports:
    - port: 80
      targetPort: 8080
      name: http
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api-gateway-ingress
  namespace: cloudach
  annotations:
    kubernetes.io/ingress.class: "gce"
    kubernetes.io/ingress.global-static-ip-name: "cloudach-api-ip"
    networking.gke.io/managed-certificates: "cloudach-ssl-cert"
    networking.gke.io/v1beta1.FrontendConfig: "cloudach-frontend-config"
spec:
  rules:
    - host: api.cloudach.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 80
---
apiVersion: networking.gke.io/v1
kind: ManagedCertificate
metadata:
  name: cloudach-ssl-cert
  namespace: cloudach
spec:
  domains:
    - api.cloudach.com
---
apiVersion: networking.gke.io/v1beta1
kind: FrontendConfig
metadata:
  name: cloudach-frontend-config
  namespace: cloudach
spec:
  redirectToHttps:
    enabled: true
