apiVersion: v1
kind: Namespace
metadata:
  name: cloudach
  labels:
    app.kubernetes.io/managed-by: kubectl
    environment: production
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: cloudach-quota
  namespace: cloudach
spec:
  hard:
    requests.cpu: "32"
    requests.memory: 128Gi
    requests.nvidia.com/gpu: "8"
    limits.cpu: "64"
    limits.memory: 256Gi
    limits.nvidia.com/gpu: "8"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cloudach-deployer
  namespace: cloudach
rules:
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: [""]
    resources: ["services", "configmaps", "secrets", "pods"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cloudach-deployer-binding
  namespace: cloudach
subjects:
  - kind: ServiceAccount
    name: cloudach-ci-sa
    namespace: cloudach
roleRef:
  kind: Role
  name: cloudach-deployer
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cloudach-ci-sa
  namespace: cloudach
  annotations:
    iam.gke.io/gcp-service-account: cloudach-ci@PROJECT_ID.iam.gserviceaccount.com
