# vLLM deployment for Mixtral-8x7B-Instruct-v0.1
# GPU: 2x NVIDIA L4 (tensor-parallel-size=2, ~48GB VRAM total)
# MoE model: ~46GB in fp16 — requires 2 L4s for comfortable fit
# Optimal settings: flash-attention-2, continuous batching, chunked prefill
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-mixtral-8x7b
  namespace: cloudach
  labels:
    app: vllm-mixtral-8x7b
    model: mixtral-8x7b
    component: inference
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm-mixtral-8x7b
  template:
    metadata:
      labels:
        app: vllm-mixtral-8x7b
        model: mixtral-8x7b
    spec:
      nodeSelector:
        cloud.google.com/gke-accelerator: nvidia-l4
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      containers:
        - name: vllm
          image: vllm/vllm-openai:v0.4.2
          args:
            - "--model"
            - "mistralai/Mixtral-8x7B-Instruct-v0.1"
            - "--served-model-name"
            - "mixtral-8x7b"
            - "--tensor-parallel-size"
            - "2"
            - "--max-model-len"
            - "32768"
            - "--port"
            - "8000"
            - "--host"
            - "0.0.0.0"
            - "--gpu-memory-utilization"
            - "0.92"
            - "--enable-chunked-prefill"
            - "--max-num-batched-tokens"
            - "4096"
          env:
            - name: HUGGING_FACE_HUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token
                  key: token
          ports:
            - containerPort: 8000
              name: http
          resources:
            requests:
              cpu: "8"
              memory: 32Gi
              nvidia.com/gpu: "2"
            limits:
              cpu: "16"
              memory: 64Gi
              nvidia.com/gpu: "2"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 120
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 180
            periodSeconds: 30
          volumeMounts:
            - name: model-cache
              mountPath: /root/.cache/huggingface
            - name: shm
              mountPath: /dev/shm
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: model-cache-pvc
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 4Gi
      terminationGracePeriodSeconds: 60
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-mixtral-8x7b
  namespace: cloudach
  labels:
    app: vllm-mixtral-8x7b
    model: mixtral-8x7b
spec:
  selector:
    app: vllm-mixtral-8x7b
  ports:
    - port: 8000
      targetPort: 8000
      name: http
  type: ClusterIP
