name: Deploy Backend (GKE)

on:
  push:
    branches: [main]
    paths:
      - 'services/**'
      - 'infra/k8s/**'

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: us-central1
  GKE_CLUSTER: cloudach-prod
  GKE_ZONE: us-central1-a
  GAR_LOCATION: us-central1
  GAR_REPOSITORY: cloudach

jobs:
  build-and-push:
    name: Build & Push to Artifact Registry
    runs-on: ubuntu-latest
    environment: production
    strategy:
      matrix:
        service: [api-gateway]
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ matrix.service }}
          tags: |
            type=sha,format=short
            type=ref,event=branch

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./services/${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to GKE
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.GKE_ZONE }}

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f infra/k8s/namespace.yaml
          kubectl apply -f infra/k8s/network-policies.yaml
          kubectl apply -f infra/k8s/vllm/
          kubectl apply -f infra/k8s/api-gateway/
          kubectl apply -f infra/k8s/monitoring/ --server-side --force-conflicts || true
          kubectl rollout status deployment/vllm-llama3-8b -n cloudach --timeout=10m
          kubectl rollout status deployment/api-gateway -n cloudach --timeout=5m
